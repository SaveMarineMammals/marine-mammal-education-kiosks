name: Exhibit contract

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: exhibit-contract-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Exhibit contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/requirements.txt

      - name: Install tool dependencies
        run: python -m pip install -r tools/requirements.txt

      - name: Validate exhibits (schema, media policy, timeline)
        run: python tools/validate_exhibits.py

      - name: Check catalog consistency
        run: python tools/catalog.py --check

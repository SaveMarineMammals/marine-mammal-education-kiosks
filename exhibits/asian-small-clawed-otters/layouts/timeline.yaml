# Widget timeline script — Asian Small-Clawed Otters
# Glance & Match: full-bleed hero wash | ID still | insight art + opaque copy | ticker.
# Bind widgets in Xibo to these start/duration marks within each region playlist.
# Copy is plain text only (no Markdown, no emoji) — Xibo text widgets escape HTML.

layoutId: asian-small-clawed-otters-glance-and-match
template: glance-and-match
durationSeconds: 24
loop: true
resolution: { width: 1920, height: 1080 }

regions:
  insights-bg:
    # Full right-pane wash — separates Zone B/C from the hero.
    widgets:
      - id: panel-insights
        type: image
        asset: bg-insights-panel
        startSeconds: 0
        durationSeconds: 24
        transitionIn: none
        transitionOut: none

  hero-bg:
    # Zone A wash — portrait asset sized to the pane (no letterbox bars).
    widgets:
      - id: hero-wetland
        type: image
        asset: bg-hero-wetland
        startSeconds: 0
        durationSeconds: 24
        transitionIn: none
        transitionOut: none

  hero-still:
    # Zone A ID still — lower frame only; wetland shows full-bleed behind.
    widgets:
      - id: hero-otter-id
        type: image
        asset: graphic-otter-silhouette
        startSeconds: 0
        durationSeconds: 24
        transitionIn: none
        transitionOut: none
        notes: Transparent PNG in the lower hero frame for 3-second tank match.

  hero-labels:
    widgets:
      - id: hero-labels
        type: text
        startSeconds: 0
        durationSeconds: 24
        transitionIn: none
        transitionOut: none
        effect: none
        copy: |
          Asian Small-Clawed Otter
          Aonyx cinereus

          About 3 feet
          About 11 pounds
          Vulnerable

  insights-art:
    # Zone B upper — card graphics only; clear gap before the copy band.
    widgets:
      - id: icon-diet
        type: image
        asset: graphic-diet-paws
        startSeconds: 0
        durationSeconds: 6
        transitionIn: fade
        transitionOut: fade
        transitionDurationMs: 500

      - id: icon-threat
        type: image
        asset: graphic-threat-wetland
        startSeconds: 6
        durationSeconds: 6
        transitionIn: fade
        transitionOut: fade
        transitionDurationMs: 500

      - id: icon-hidden-fact
        type: image
        asset: graphic-fact-family
        startSeconds: 12
        durationSeconds: 6
        transitionIn: fade
        transitionOut: fade
        transitionDurationMs: 500

      - id: icon-how-to-help
        type: image
        asset: graphic-help-donate
        startSeconds: 18
        durationSeconds: 6
        transitionIn: fade
        transitionOut: fade
        transitionDurationMs: 500

  insights-copy:
    # Zone B lower — card bullets with band painted IN the text widget
    # (do not use a separate scrim image; Xibo aspect-fits it and misaligns).
    widgets:
      - id: card-diet
        type: text
        card: 1
        startSeconds: 0
        durationSeconds: 6
        transitionIn: fade
        transitionOut: fade
        transitionDurationMs: 500
        effect: none
        copy: |
          Diet

          - Hunt crabs, snails, and shrimp
          - Feel for food with soft paws
          - Love shallow wetlands and rice fields

      - id: card-threat
        type: text
        card: 2
        startSeconds: 6
        durationSeconds: 6
        transitionIn: fade
        transitionOut: fade
        transitionDurationMs: 500
        effect: none
        copy: |
          Threat

          - Wetlands shrink when people fill them
          - Illegal pet trade takes wild otters
          - Dirty water poisons their crab meals

      - id: card-hidden-fact
        type: text
        card: 3
        startSeconds: 12
        durationSeconds: 6
        transitionIn: fade
        transitionOut: fade
        transitionDurationMs: 500
        effect: none
        copy: |
          Hidden Fact

          - Smallest otter species on Earth
          - Live in family groups up to 15
          - Use 12 or more calls to stay together

      - id: card-how-to-help
        type: text
        card: 4
        startSeconds: 18
        durationSeconds: 6
        transitionIn: fade
        transitionOut: fade
        transitionDurationMs: 500
        effect: none
        copy: |
          How to Help

          - Never keep wild otters as pets
          - Keep trash and plastic out of water
          - Share what you learned today

  ticker:
    # Zone C — slim footer; one CTA via native Xibo marqueeLeft (not CSS).
    widgets:
      - id: ticker-cta
        type: text
        startSeconds: 0
        durationSeconds: 24
        transitionIn: none
        transitionOut: none
        effect: tickerScroll
        copy: |
          Donate to your local wildlife conservation group

cueSheet:
  - { t: 0, action: "hero full-bleed; Diet art + copy; ticker on" }
  - { t: 6, action: "insights: Threat art + copy" }
  - { t: 12, action: "insights: Hidden Fact art + copy" }
  - { t: 18, action: "insights: How to Help art + copy" }
  - { t: 24, action: "layout loops to t=0 (hero never changes)" }

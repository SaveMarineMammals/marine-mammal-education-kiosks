<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bubbles</title>
<style>
  html, body { margin:0; width:100%; height:100%; overflow:hidden; background:transparent; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let bubbles = [];
function resize() {
  canvas.width = canvas.clientWidth * devicePixelRatio;
  canvas.height = canvas.clientHeight * devicePixelRatio;
}
function spawn() {
  bubbles.push({
    x: Math.random() * canvas.width,
    y: canvas.height + 20,
    r: 4 + Math.random() * 14,
    v: 0.4 + Math.random() * 1.2,
    a: 0.25 + Math.random() * 0.45,
    w: Math.random() * Math.PI * 2
  });
}
for (let i = 0; i < 18; i++) spawn();
function frame(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const b of bubbles) {
    b.y -= b.v * devicePixelRatio;
    b.x += Math.sin(t / 400 + b.w) * 0.35;
    if (b.y < -30) { b.y = canvas.height + 20; b.x = Math.random() * canvas.width; }
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r * devicePixelRatio, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(232,244,248,${b.a})`;
    ctx.lineWidth = 2 * devicePixelRatio;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.3 * devicePixelRatio, b.y - b.r * 0.3 * devicePixelRatio,
            b.r * 0.25 * devicePixelRatio, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${b.a * 0.7})`;
    ctx.fill();
  }
  requestAnimationFrame(frame);
}
window.addEventListener('resize', resize);
resize();
requestAnimationFrame(frame);
</script>
</body>
</html>
